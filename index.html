<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boeing Flight Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; text-shadow: 1px 1px 2px black; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; }
        #aircraft-select { position: absolute; top: 20px; right: 20px; pointer-events: all; }
        select { padding: 5px; border-radius: 4px; background: #333; color: white; border: 1px solid #555; }
        .stat { font-size: 1.2rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">Aircraft: <span id="ui-model">Boeing 737</span></div>
        <div class="stat">Speed: <span id="ui-speed">0</span> knots</div>
        <div class="stat">Altitude: <span id="ui-alt">0</span> ft</div>
    </div>

    <div id="aircraft-select">
        <select id="planePicker">
            <option value="737">Boeing 737 (Short Haul)</option>
            <option value="747">Boeing 747 (Jumbo Jet)</option>
            <option value="777">Boeing 777 (Long Haul)</option>
            <option value="787">Boeing 787 (Dreamliner)</option>
        </select>
    </div>

    <div id="controls">
        <b>Controls:</b><br>
        W / S : Pitch Up / Down<br>
        A / D : Roll Left / Right<br>
        Shift / Ctrl : Increase / Decrease Throttle
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const planes = {
            '737': { color: 0xeeeeee, speedMult: 1.2, handling: 0.03, scale: [1, 0.4, 2] },
            '747': { color: 0xffffff, speedMult: 1.0, handling: 0.015, scale: [2, 0.8, 3.5] },
            '777': { color: 0xdddddd, speedMult: 1.1, handling: 0.02, scale: [1.5, 0.6, 3] },
            '787': { color: 0x87CEEB, speedMult: 1.3, handling: 0.025, scale: [1.4, 0.5, 2.8] }
        };

        let currentPlane = '737';
        let speed = 0;
        const input = { w: false, s: false, a: false, d: false, shift: false, ctrl: false };

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 100, 2000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- Terrain ---
        const grid = new THREE.GridHelper(10000, 100, 0x000044, 0x000044);
        scene.add(grid);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(10000, 10000);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Aircraft Model (Procedural) ---
        let aircraftGroup = new THREE.Group();
        scene.add(aircraftGroup);

        function createPlane(type) {
            aircraftGroup.clear();
            const config = planes[type];
            
            // Fuselage
            const bodyGeo = new THREE.BoxGeometry(...config.scale);
            const bodyMat = new THREE.MeshPhongMaterial({ color: config.color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            aircraftGroup.add(body);

            // Wings
            const wingGeo = new THREE.BoxGeometry(config.scale[0] * 4, 0.1, 1);
            const wing = new THREE.Mesh(wingGeo, bodyMat);
            aircraftGroup.add(wing);

            // Tail
            const tailGeo = new THREE.BoxGeometry(0.1, 1, 0.5);
            const tail = new THREE.Mesh(tailGeo, bodyMat);
            tail.position.set(0, 0.5, config.scale[2]/2);
            aircraftGroup.add(tail);

            aircraftGroup.position.y = 5; 
        }

        createPlane('737');

        // --- Input Listeners ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'shift') input.shift = true;
            if (key === 'control') input.ctrl = true;
            if (input.hasOwnProperty(key)) input[key] = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'shift') input.shift = false;
            if (key === 'control') input.ctrl = false;
            if (input.hasOwnProperty(key)) input[key] = false;
        });

        document.getElementById('planePicker').addEventListener('change', (e) => {
            currentPlane = e.target.value;
            document.getElementById('ui-model').innerText = `Boeing ${currentPlane}`;
            createPlane(currentPlane);
        });

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const config = planes[currentPlane];

            // Handle Physics
            if (input.shift) speed += 0.1;
            if (input.ctrl) speed -= 0.1;
            speed = Math.max(0, Math.min(speed, 5 * config.speedMult));

            if (input.w) aircraftGroup.rotateX(config.handling);
            if (input.s) aircraftGroup.rotateX(-config.handling);
            if (input.a) aircraftGroup.rotateZ(config.handling);
            if (input.d) aircraftGroup.rotateZ(-config.handling);

            // Move forward based on orientation
            aircraftGroup.translateZ(-speed);

            // Simple "Ground Collision"
            if (aircraftGroup.position.y < 0.5) {
                aircraftGroup.position.y = 0.5;
                speed *= 0.9; // Friction
            }

            // Camera follow
            const relativeCameraOffset = new THREE.Vector3(0, 5, 15);
            const cameraOffset = relativeCameraOffset.applyMatrix4(aircraftGroup.matrixWorld);
            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;
            camera.lookAt(aircraftGroup.position);

            // Update UI
            document.getElementById('ui-speed').innerText = Math.round(speed * 40);
            document.getElementById('ui-alt').innerText = Math.round(aircraftGroup.position.y * 10);

            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
